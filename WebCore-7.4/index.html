<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Technic Brands</title>
</head>

                <img src="Img/Arrow.png" alt="Arrow" class="arrow-logo">
            </a>
        </div>

        <div class="brand__container">
